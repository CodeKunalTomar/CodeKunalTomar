<svg width="900" height="16" viewBox="0 0 900 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D9FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="8" x2="900" y2="8" stroke="url(#base)" stroke-width="1"/>
  <rect x="-120" y="7" width="120" height="2" rx="1" fill="url(#pulse)">
    <animate attributeName="x" from="-120" to="900" dur="3.6s" repeatCount="indefinite"/>
  </rect>
</svg>
