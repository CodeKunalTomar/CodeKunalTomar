<svg width="760" height="350" viewBox="0 0 760 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, Menlo, monospace; font-size: 15px; }
    .title { font-size: 12px; fill: #8B949E; }
    .p { fill: #3FB950; }
    .c { fill: #E6EDF3; }
    .o { fill: #8B949E; }
    .d { fill: #58A6FF; }
    .a { fill: #00D9FF; }
  </style>

  <!-- ambient glow -->
  <ellipse cx="380" cy="175" rx="370" ry="150" fill="url(#glow)" opacity="0.5">
    <animate attributeName="opacity" values="0.35;0.65;0.35" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- window -->
  <rect x="20" y="20" width="720" height="310" rx="12" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <rect x="21" y="21" width="718" height="2" rx="1" fill="url(#accent)" opacity="0.8"/>

  <!-- title bar -->
  <circle cx="48" cy="46" r="6" fill="#FF5F56" opacity="0.85"/>
  <circle cx="70" cy="46" r="6" fill="#FFBD2E" opacity="0.85"/>
  <circle cx="92" cy="46" r="6" fill="#27C93F" opacity="0.85"/>
  <text x="380" y="50" text-anchor="middle" class="title">kunal@github : ~</text>
  <line x1="21" y1="62" x2="739" y2="62" stroke="#21262D" stroke-width="1"/>

  <!-- line 1: whoami -->
  <g opacity="0">
    <set attributeName="opacity" to="1" begin="0.15s" fill="freeze"/>
    <text x="48" y="100" xml:space="preserve"><tspan class="p">~ $ </tspan><tspan class="c" opacity="0">w<set attributeName="opacity" to="1" begin="0.60s" fill="freeze"/></tspan><tspan class="c" opacity="0">h<set attributeName="opacity" to="1" begin="0.68s" fill="freeze"/></tspan><tspan class="c" opacity="0">o<set attributeName="opacity" to="1" begin="0.76s" fill="freeze"/></tspan><tspan class="c" opacity="0">a<set attributeName="opacity" to="1" begin="0.84s" fill="freeze"/></tspan><tspan class="c" opacity="0">m<set attributeName="opacity" to="1" begin="0.92s" fill="freeze"/></tspan><tspan class="c" opacity="0">i<set attributeName="opacity" to="1" begin="1.00s" fill="freeze"/></tspan></text>
  </g>

  <!-- line 2: whoami output -->
  <g opacity="0">
    <set attributeName="opacity" to="1" begin="1.40s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.40s" dur="0.35s" fill="freeze"/>
    <text x="48" y="128" xml:space="preserve"><tspan class="a">Kunal Tomar</tspan><tspan class="o"> · machines that see, move, and learn</tspan></text>
  </g>

  <!-- line 3: ls research -->
  <g opacity="0">
    <set attributeName="opacity" to="1" begin="2.20s" fill="freeze"/>
    <text x="48" y="168" xml:space="preserve"><tspan class="p">~ $ </tspan><tspan class="c" opacity="0">l<set attributeName="opacity" to="1" begin="2.40s" fill="freeze"/></tspan><tspan class="c" opacity="0">s<set attributeName="opacity" to="1" begin="2.48s" fill="freeze"/></tspan><tspan class="c" opacity="0"> <set attributeName="opacity" to="1" begin="2.56s" fill="freeze"/></tspan><tspan class="c" opacity="0">~<set attributeName="opacity" to="1" begin="2.64s" fill="freeze"/></tspan><tspan class="c" opacity="0">/<set attributeName="opacity" to="1" begin="2.72s" fill="freeze"/></tspan><tspan class="c" opacity="0">r<set attributeName="opacity" to="1" begin="2.80s" fill="freeze"/></tspan><tspan class="c" opacity="0">e<set attributeName="opacity" to="1" begin="2.88s" fill="freeze"/></tspan><tspan class="c" opacity="0">s<set attributeName="opacity" to="1" begin="2.96s" fill="freeze"/></tspan><tspan class="c" opacity="0">e<set attributeName="opacity" to="1" begin="3.04s" fill="freeze"/></tspan><tspan class="c" opacity="0">a<set attributeName="opacity" to="1" begin="3.12s" fill="freeze"/></tspan><tspan class="c" opacity="0">r<set attributeName="opacity" to="1" begin="3.20s" fill="freeze"/></tspan><tspan class="c" opacity="0">c<set attributeName="opacity" to="1" begin="3.28s" fill="freeze"/></tspan><tspan class="c" opacity="0">h<set attributeName="opacity" to="1" begin="3.36s" fill="freeze"/></tspan></text>
  </g>

  <!-- line 4: ls output -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.80s" dur="0.35s" fill="freeze"/>
    <text x="48" y="196" xml:space="preserve"><tspan class="d">vr-cognitive-training/</tspan><tspan class="o">   </tspan><tspan class="d">uav-autonomy/</tspan><tspan class="o">   </tspan><tspan class="d">nonstationary-bandits/</tspan></text>
  </g>

  <!-- line 5: cat focus.txt -->
  <g opacity="0">
    <set attributeName="opacity" to="1" begin="4.60s" fill="freeze"/>
    <text x="48" y="236" xml:space="preserve"><tspan class="p">~ $ </tspan><tspan class="c" opacity="0">c<set attributeName="opacity" to="1" begin="4.80s" fill="freeze"/></tspan><tspan class="c" opacity="0">a<set attributeName="opacity" to="1" begin="4.88s" fill="freeze"/></tspan><tspan class="c" opacity="0">t<set attributeName="opacity" to="1" begin="4.96s" fill="freeze"/></tspan><tspan class="c" opacity="0"> <set attributeName="opacity" to="1" begin="5.04s" fill="freeze"/></tspan><tspan class="c" opacity="0">f<set attributeName="opacity" to="1" begin="5.12s" fill="freeze"/></tspan><tspan class="c" opacity="0">o<set attributeName="opacity" to="1" begin="5.20s" fill="freeze"/></tspan><tspan class="c" opacity="0">c<set attributeName="opacity" to="1" begin="5.28s" fill="freeze"/></tspan><tspan class="c" opacity="0">u<set attributeName="opacity" to="1" begin="5.36s" fill="freeze"/></tspan><tspan class="c" opacity="0">s<set attributeName="opacity" to="1" begin="5.44s" fill="freeze"/></tspan><tspan class="c" opacity="0">.<set attributeName="opacity" to="1" begin="5.52s" fill="freeze"/></tspan><tspan class="c" opacity="0">t<set attributeName="opacity" to="1" begin="5.60s" fill="freeze"/></tspan><tspan class="c" opacity="0">x<set attributeName="opacity" to="1" begin="5.68s" fill="freeze"/></tspan><tspan class="c" opacity="0">t<set attributeName="opacity" to="1" begin="5.76s" fill="freeze"/></tspan></text>
  </g>

  <!-- line 6: cat output -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="6.20s" dur="0.35s" fill="freeze"/>
    <text x="48" y="264" xml:space="preserve"><tspan class="o">unity vr simulators · px4 + ros2 autonomy · honest ml evaluation</tspan></text>
  </g>

  <!-- line 7: idle prompt + blinking cursor -->
  <g opacity="0">
    <set attributeName="opacity" to="1" begin="7.00s" fill="freeze"/>
    <text x="48" y="304" xml:space="preserve"><tspan class="p">~ $ </tspan></text>
    <rect x="86" y="291" width="9" height="17" fill="#00D9FF" opacity="0">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" begin="7.00s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
